# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Pull the (separate) signature-app repo into /signature-app so it is
      # published at https://www.choicesflooringmackay.au/signature-app/
      - name: Add signature app
        uses: actions/checkout@v4
        with:
          repository: usmansafdarktk/choicesflooring-signatureapp
          ref: main
          path: signature-app
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject Google Maps API key
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          test -n "$GOOGLE_MAPS_API_KEY" || { echo "Missing GitHub secret: GOOGLE_MAPS_API_KEY"; exit 1; }
          node -e "
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');
          if (!html.includes('__GOOGLE_MAPS_API_KEY__')) {
            console.log('Placeholder not found — already replaced, skipping.');
            process.exit(0);
          }
          const key = process.env.GOOGLE_MAPS_API_KEY;
          if (!key || key.trim() === '') {
            console.error('FATAL: GOOGLE_MAPS_API_KEY is empty or whitespace.');
            process.exit(1);
          }
          const before = html;
          html = html.split('__GOOGLE_MAPS_API_KEY__').join(key);
          fs.writeFileSync(path, html, 'utf8');
          if (html.includes('__GOOGLE_MAPS_API_KEY__')) {
            console.error('FATAL: Placeholder still present after replacement!');
            process.exit(1);
          }
          const count = before.split('__GOOGLE_MAPS_API_KEY__').length - 1;
          console.log('Replaced ' + count + ' occurrence(s) of __GOOGLE_MAPS_API_KEY__');
          "
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
